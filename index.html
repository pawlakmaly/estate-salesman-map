<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estate Salesman Map – POI Explorer</title>
  <link rel="stylesheet" href="lib/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ───────────────────────────────────────────────────── -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>🗺️ POI Map Explorer</h1>
        <p class="subtitle">Find Points of Interest around any location</p>
      </div>

      <!-- Location -->
      <div class="control-group">
        <label for="location-input">📍 Location</label>
        <div class="input-row">
          <input
            type="text"
            id="location-input"
            placeholder="Enter address or place name…"
            autocomplete="off"
          />
          <button id="search-btn" class="btn btn-secondary" title="Search location">Search</button>
        </div>
        <p class="hint">Or click anywhere on the map to set a location.</p>
      </div>

      <!-- Area shape -->
      <div class="control-group">
        <label>🔷 Area Shape</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="shape" value="circle" checked /> Circle
          </label>
          <label class="radio-label">
            <input type="radio" name="shape" value="square" /> Square
          </label>
        </div>
      </div>

      <!-- Range -->
      <div class="control-group">
        <label for="range-select">📏 Range</label>
        <select id="range-select">
          <option value="500">500 m</option>
          <option value="1000" selected>1 km</option>
          <option value="2000">2 km</option>
          <option value="5000">5 km</option>
          <option value="10000">10 km</option>
        </select>
      </div>

      <!-- POI types -->
      <div class="control-group poi-group">
        <label>🏷️ Points of Interest</label>
        <div id="poi-list">
          <!-- checkboxes generated by app.js -->
        </div>
      </div>

      <button id="find-btn" class="btn btn-primary" disabled>🔍 Find POIs</button>
      <div id="status-msg" class="status-msg" role="status" aria-live="polite"></div>
    </aside>

    <!-- ── Map + Legend ───────────────────────────────────────────────── -->
    <main id="map-container">
      <div id="map"></div>
      <div id="legend" class="legend hidden" aria-label="POI legend"></div>
    </main>

  </div>

  <script src="lib/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
